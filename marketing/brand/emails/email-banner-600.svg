<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Income Academy">
  <title>Income Academy — Email Header Banner (600×200)</title>
  <defs>
    <linearGradient id="emailBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="200" fill="url(#emailBg)"/>

  <!-- Mark -->
  <rect x="40" y="48" width="104" height="104" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="92" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="900" font-size="58" fill="#f59e0b" text-anchor="middle" letter-spacing="-2">IA</text>
  <rect x="62" y="138" width="60" height="3" rx="1.5" fill="#f59e0b"/>

  <!-- Wordmark -->
  <text x="170" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="800" font-size="38" fill="#ffffff" letter-spacing="-1">Income Academy</text>
  <text x="170" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="600" font-size="13" fill="#f59e0b" letter-spacing="3">SKILLS-FIRST BUSINESS EDUCATION</text>
</svg>
