<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Income Academy">
  <title>Income Academy — Main OG Image (1200×630)</title>
  <defs>
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="mainShimmer" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#mainBg)"/>
  <rect width="1200" height="630" fill="url(#mainShimmer)"/>

  <!-- IA mark, large, centered horizontally, top -->
  <rect x="500" y="80" width="200" height="200" rx="32" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
  <text x="600" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="900" font-size="120" fill="#f59e0b" text-anchor="middle" letter-spacing="-4">IA</text>
  <rect x="540" y="240" width="120" height="6" rx="3" fill="#f59e0b"/>

  <!-- Brand name -->
  <text x="600" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="800" font-size="64" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Income Academy</text>

  <!-- Tagline -->
  <text x="600" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="500" font-size="26" fill="#94a3b8" text-anchor="middle">Four honest ways to earn money from home —</text>
  <text x="600" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="500" font-size="26" fill="#94a3b8" text-anchor="middle">then one real business if you want to go bigger.</text>

  <!-- Foundation Pass tag -->
  <rect x="450" y="510" width="300" height="50" rx="25" fill="rgba(245, 158, 11, 0.15)" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="544" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="700" font-size="18" fill="#f59e0b" text-anchor="middle" letter-spacing="3">FOUNDATION PASS · $47 + $19/MO</text>
</svg>
